name: app
description: "A new Flutter project."
publish_to: 'none' # Private project

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_sign_in: any
  flutter_facebook_auth: any
  url_launcher: any
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.0
  http: ^1.1.0  # <-- For connecting to your Sensora backend
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.0.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/Sensora logo.png
    - lib/assets/facebook logo.png
    - lib/assets/google_logo.png
